# Goal - To ensure my app is free from OWASP top 10 security issues.

name: DAST

on:
    workflow_call:

jobs:
    dast:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Wait for the application to be up and running
              run: | 
                timeout 60 sh -c 'until curl -s http://${{ secrets.EC2_HOST }}:8080; do sleep 5; done'

            - name: Run OWASP ZAP Scan
              uses: zaproxy/action-baseline@v0.14.0
              with:
                target: http://${{ secrets.EC2_HOST }}:8080
                rules_file_name: .github/workflows/rules.txt
                fail_action: false
                allow_issue_writting: true