# Goal - Push the image to Docker Hub

name: Docker Push

on:
    workflow_call:

jobs:
    docker-push:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                folders: ['backend','frontend']
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Docker Setup [Login]
              uses: docker/login-action@v2
              with:
                username: ${{ vars.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Docker Build ${{ matrix.folders }}
              run: docker build -t ${{ vars.DOCKER_USERNAME }}/devdashboard-${{ matrix.folders }}:latest .
              working-directory: ${{ matrix.folders }}

            - name: Docker Push ${{ matrix.folders }}
              run: docker push ${{ vars.DOCKER_USERNAME }}/devdashboard-${{ matrix.folders }}:latest