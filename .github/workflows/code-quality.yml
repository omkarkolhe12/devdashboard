# Goal - I have to do SAST for my code.
name: Code Quality

on:
    workflow_call:  # We can call this workflow before/after from any other workflows

jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json

            - name: Install npm Packages
              run: npm install
              working-directory: frontend

            - name: Run Linter
              run: npm run lint
              working-directory: frontend

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.23'
                  go-version-file: backend/go.mod
                  cache-dependency-path: backend/go.sum
            
            - name: Run Go Formatter
              run: go fmt ./...
              working-directory: backend

            - name: Run Go Vet
              run: go vet ./...
              working-directory: backend

            