# Goal - To check whether the app code coverage doesnt have security threats.

name: SonarQube Scan

on:
    workflow_call:

jobs:
    sonar-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v8.2.0
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SoNAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}