apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: devdashboard
  labels:
    app: devdashboard-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devdashboard-postgres
  template:
    metadata:
      labels:
        app: devdashboard-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            valueFrom:
              configMapKeyRef:
                name: devdashboard-configmap
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: devdashboard-secrets
                key: POSTGRES_PASSWORD
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: devdashboard-secrets
                key: POSTGRES_DB
        volumeMounts:
          - name: init
            mountPath: /docker-entrypoint-initdb.d
            readOnly: true
          - name: data
            mountPath: /var/lib/postgresql/data
      volumes:
        - name: init
          configMap:
            name: postgres-init
        - name: data
          persistentVolumeClaim: 
            claimName: postgres-pvc

