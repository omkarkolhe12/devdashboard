# This is a headless service for the PostgreSQL StatefulSet.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: devdashboard
spec:
  clusterIP: None  # Headless service for StatefulSet
  selector:
    app: devdashboard-postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432  # Pod/Application port

